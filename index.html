```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0,
                   maximum-scale=1.0,
                   user-scalable=no" />

    <title>FIN Scanner</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Html5 QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col p-4">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1 class="text-2xl font-bold text-emerald-400">
            FIN SCANNER
        </h1>

        <p class="text-slate-400 text-sm">
            Barcode Scanner System
        </p>
    </div>

    <!-- CAMERA VIEW -->
    <div class="bg-black rounded-xl overflow-hidden border border-slate-700">

        <div id="reader"
             style="width:100%; min-height:350px;">
        </div>

    </div>

    <!-- STATUS -->
    <div id="status"
         class="mt-4 p-3 rounded-lg bg-slate-800 text-sm text-slate-300">

        Waiting to start scanner...
    </div>

    <!-- RESULT -->
    <div id="result-card"
         class="hidden mt-4 p-4 rounded-xl border border-emerald-500 bg-slate-800">

        <div class="text-sm text-slate-400">
            SCANNED RESULT
        </div>

        <div id="display-fin"
             class="text-2xl font-bold mt-2 text-emerald-400 font-mono">
        </div>

        <div id="display-status"
             class="mt-3 text-lg font-bold">
        </div>

        <div id="display-advice"
             class="mt-3 p-3 rounded bg-slate-900 text-sm">
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="mt-4 grid grid-cols-2 gap-3">

        <button onclick="startScanner()"
                class="bg-emerald-500 text-black font-bold py-4 rounded-xl">

            START SCANNER
        </button>

        <button onclick="stopScanner()"
                class="bg-rose-500 text-white font-bold py-4 rounded-xl">

            STOP
        </button>
    </div>

    <!-- MANUAL TEST -->
    <div class="mt-4 bg-slate-800 p-3 rounded-xl">

        <div class="text-sm text-slate-400 mb-2">
            Manual FIN Test
        </div>

        <div class="flex gap-2">

            <input id="manual-fin"
                   type="text"
                   placeholder="F1234567X"
                   class="flex-1 bg-slate-900 border border-slate-600 rounded px-3 py-2 uppercase font-mono" />

            <button onclick="manualSubmit()"
                    class="bg-slate-700 px-4 rounded">

                Submit
            </button>

        </div>
    </div>

<script>

let scanner = null;
let scannerRunning = false;

function setStatus(message) {
    document.getElementById("status").innerText = message;
}

function isValidFIN(fin) {
    return /^[FGM][0-9]{7}[A-Z]$/.test(fin);
}

async function startScanner() {

    try {

        setStatus("Requesting camera permission...");

        // Force camera permission popup
        await navigator.mediaDevices.getUserMedia({
            video: true
        });

        setStatus("Camera permission granted.");

        if (scannerRunning && scanner) {
            await stopScanner();
        }

        scanner = new Html5Qrcode("reader");

        // Get all cameras
        const devices = await Html5Qrcode.getCameras();

        if (!devices || devices.length === 0) {
            setStatus("No camera detected.");
            return;
        }

        // Prefer back camera
        let cameraId = devices[0].id;

        const backCamera = devices.find(device =>
            device.label.toLowerCase().includes("back")
        );

        if (backCamera) {
            cameraId = backCamera.id;
        }

        setStatus("Starting camera scanner...");

        await scanner.start(
            cameraId,

            {
                fps: 10,

                qrbox: {
                    width: 300,
                    height: 150
                },

                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                },

                formatsToSupport: [

                    Html5QrcodeSupportedFormats.PDF_417,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.QR_CODE,
                    Html5QrcodeSupportedFormats.EAN_13
                ]
            },

            (decodedText) => {

                console.log("SCANNED:", decodedText);

                setStatus("Barcode detected.");

                processScan(decodedText);
            },

            (errorMessage) => {
                // Ignore frame processing errors
            }
        );

        scannerRunning = true;

        setStatus("Scanner active. Point camera at barcode.");

    } catch (err) {

        console.error(err);

        setStatus(
            "Camera failed: " + err
        );

        alert(
            "Unable to start camera.\n\n" +
            "Checklist:\n" +
            "1. Use HTTPS or localhost\n" +
            "2. Allow camera permissions\n" +
            "3. Close other camera apps\n" +
            "4. Try Chrome browser"
        );
    }
}

async function stopScanner() {

    try {

        if (scanner && scannerRunning) {

            await scanner.stop();
            await scanner.clear();

            scannerRunning = false;

            setStatus("Scanner stopped.");
        }

    } catch (err) {

        console.error(err);
    }
}

function processScan(decodedText) {

    let cleanedFIN =
        decodedText.trim().toUpperCase();

    // If barcode contains extra text,
    // try extracting FIN pattern
    const match =
        cleanedFIN.match(/[FGM][0-9]{7}[A-Z]/);

    if (match) {
        cleanedFIN = match[0];
    }

    if (!isValidFIN(cleanedFIN)) {

        setStatus(
            "Barcode scanned but FIN format invalid."
        );

        return;
    }

    simulateDatabaseQuery(cleanedFIN);
}

function manualSubmit() {

    const input =
        document.getElementById("manual-fin");

    const value =
        input.value.trim().toUpperCase();

    if (!isValidFIN(value)) {

        alert("Invalid FIN format");

        return;
    }

    processScan(value);

    input.value = "";
}

function simulateDatabaseQuery(fin) {

    let count =
        localStorage.getItem(fin);

    count = count ? parseInt(count) : 0;

    localStorage.setItem(fin, count + 1);

    showResult(fin, count);
}

function showResult(fin, offences) {

    const card =
        document.getElementById("result-card");

    card.classList.remove("hidden");

    document.getElementById("display-fin")
        .innerText = fin;

    const status =
        document.getElementById("display-status");

    const advice =
        document.getElementById("display-advice");

    if (offences === 0) {

        status.innerText =
            "1ST TIME OFFENDER";

        status.className =
            "mt-3 text-lg font-bold text-blue-400";

        advice.innerText =
            "Issue verbal advisory.";

    }
    else if (offences === 1) {

        status.innerText =
            "2ND TIME OFFENDER";

        status.className =
            "mt-3 text-lg font-bold text-amber-400";

        advice.innerText =
            "Issue composition fine.";

    }
    else {

        status.innerText =
            "REPEAT OFFENDER";

        status.className =
            "mt-3 text-lg font-bold text-rose-400";

        advice.innerText =
            "Escalate for investigation.";

    }
}

</script>

</body>
</html>
