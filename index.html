<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIN Scanner - Production Build</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Html5 QRCode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-slate-900 text-white font-sans antialiased h-screen overflow-hidden flex flex-col justify-between p-4 selection:bg-emerald-500 selection:text-slate-900">

    <!-- Header Area -->
    <header class="text-center py-2 border-b border-slate-700 shrink-0">
        <h1 class="text-lg font-bold tracking-wide text-emerald-400">FIN SCANNER PROTOCOL</h1>
        <p class="text-[10px] text-slate-400 font-mono">Secure Cloud Sync Active</p>
    </header>

    <!-- Main Dynamic Viewport -->
    <main class="flex-grow flex flex-col justify-center my-2 space-y-4 overflow-hidden">
        
        <!-- Viewfinder (Optimized for standard browser view & explicit aspect ratio) -->
        <div class="overflow-hidden rounded-xl border-2 border-slate-700 bg-slate-950 relative max-h-[38vh] aspect-video mx-auto w-full">
            <div id="reader" class="w-full h-full"></div>
        </div>

        <!-- Testing Panel: Manual input if camera is unavailable -->
        <div class="bg-slate-800 p-3 rounded-lg border border-slate-700 text-xs shrink-0">
            <label class="block text-slate-400 mb-1">Manual Override Input (Test / Fallback):</label>
            <div class="flex gap-2">
                <input type="text" id="manual-fin" placeholder="e.g., F1234567X" class="bg-slate-950 border border-slate-600 rounded px-2 py-1 flex-grow font-mono uppercase text-white focus:outline-none focus:border-emerald-500">
                <button onclick="testManualInput()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded font-bold transition">Simulate</button>
            </div>
        </div>

        <!-- Real-time Output Display Panel -->
        <div id="result-card" class="hidden p-4 rounded-xl border bg-slate-800 transition-all duration-300 overflow-y-auto">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Target FIN</span>
                <span id="display-fin" class="text-lg font-mono font-bold text-white"></span>
            </div>
            
            <div class="mt-2 p-2 rounded bg-slate-950 border border-slate-700">
                <div class="text-[10px] text-slate-400 uppercase">Offence Status</div>
                <div id="display-status" class="text-lg font-black mt-0.5"></div>
            </div>

            <div class="mt-3">
                <div class="text-[10px] text-slate-400 uppercase mb-0.5">Mandatory Officer Action</div>
                <div id="display-advice" class="p-3 rounded text-xs font-semibold leading-relaxed"></div>
            </div>
        </div>
    </main>

    <!-- Trigger Button -->
    <footer class="pb-2 shrink-0">
        <button onclick="startScanning()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-base rounded-xl transition active:scale-98 shadow-lg">
            START LIVE CAMERA SCAN
        </button>
    </footer>

    <!-- Frontend Core JavaScript Architecture -->
    <script>
        let html5Qrcode;

        function isValidFIN(fin) {
            return /^[FGMfgm][0-9]{7}[A-Za-z]$/.test(fin.trim());
        }

        async function startScanning() {

    document.getElementById('result-card').classList.add('hidden');

    if (html5Qrcode) {
        try {
            await html5Qrcode.stop();
            await html5Qrcode.clear();
        } catch(e) {
            console.log(e);
        }
    }

    try {

        html5Qrcode = new Html5Qrcode("reader");

        const containerWidth =
            document.getElementById('reader').clientWidth;

        const targetScanWidth =
            Math.min(containerWidth * 0.7, 250);

        const config = {
            fps: 10,
            qrbox: {
                width: targetScanWidth,
                height: targetScanWidth * 0.5
            },
            aspectRatio: 1.777778
        };

        await html5Qrcode.start(
            {
                facingMode: { exact: "environment" }
            },
            config,

            (decodedText) => {

                let cleanedFIN =
                    decodedText.trim().toUpperCase();

                if (isValidFIN(cleanedFIN)) {

                    html5Qrcode.stop();

                    simulateDatabaseQuery(cleanedFIN);
                }
            },

            (errorMessage) => {
                // Ignore frame scan errors
            }
        );

    } catch (err) {

        console.error("Camera start failed:", err);

        alert(
            "Unable to access camera.\n\n" +
            "Possible causes:\n" +
            "- Camera permission denied\n" +
            "- Not HTTPS\n" +
            "- Safari browser restrictions\n" +
            "- Camera already in use"
        );
    }
}

        function testManualInput() {
            let inputField = document.getElementById('manual-fin');
            let cleanedFIN = inputField.value.trim().toUpperCase();
            if (isValidFIN(cleanedFIN)) {
                simulateDatabaseQuery(cleanedFIN);
                inputField.value = ""; // Clear input safely
                // Force collapse open soft keyboard layout on mobile
                inputField.blur();
            } else {
                alert("Invalid Singapore FIN structure layout. E.g. F1234567X");
            }
        }

        function simulateDatabaseQuery(finNumber) {
            let existingCount = localStorage.getItem(finNumber);
            let currentOffenceCount = existingCount ? parseInt(existingCount) : 0;
            
            executeRulesEngine(finNumber, currentOffenceCount);
            localStorage.setItem(finNumber, currentOffenceCount + 1);
        }

        function executeRulesEngine(fin, totalOffences) {
            const card = document.getElementById('result-card');
            const finDisplay = document.getElementById('display-fin');
            const statusDisplay = document.getElementById('display-status');
            const adviceDisplay = document.getElementById('display-advice');

            finDisplay.innerText = fin;
            card.classList.remove('hidden');
            card.className = "p-4 rounded-xl border bg-slate-800 transition-all duration-300 shrink-0 ";
            adviceDisplay.className = "p-3 rounded text-xs font-semibold leading-relaxed ";

            if (totalOffences === 0) {
                card.classList.add('border-blue-500');
                statusDisplay.innerText = "1ST TIME OFFENDER";
                statusDisplay.className = "text-lg font-black mt-0.5 text-blue-400";
                adviceDisplay.innerText = "ACTION: Record particulars. Issue a verbal safety warning. Hand over the standard compliance informational pamphlet.";
                adviceDisplay.classList.add('bg-blue-950', 'text-blue-200', 'border', 'border-blue-800');
            } else if (totalOffences === 1) {
                card.classList.add('border-amber-500');
                statusDisplay.innerText = "2ND TIME OFFENDER";
                statusDisplay.className = "text-lg font-black mt-0.5 text-amber-400";
                adviceDisplay.innerText = "ACTION: Issue an official composition fine notice. Escalate entry details and verify physical work pass legitimacy.";
                adviceDisplay.classList.add('bg-amber-950', 'text-amber-200', 'border', 'border-amber-800');
            } else {
                card.classList.add('border-rose-600');
                statusDisplay.innerText = `REPEAT OFFENDER (${totalOffences} Previous Logs)`;
                statusDisplay.className = "text-lg font-black mt-0.5 text-rose-500";
                adviceDisplay.innerText = "CRITICAL ACTION: Deny facility clearance immediately. Detain physical card if appropriate. Initiate formal investigation paperwork.";
                adviceDisplay.classList.add('bg-rose-950', 'text-rose-200', 'border', 'border-rose-900');
            }
        }
    </script>
</body>
</html>
