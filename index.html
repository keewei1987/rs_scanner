<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>FIN Scanner Prototype</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen p-4">

<div class="max-w-6xl mx-auto">

    <h1 class="text-3xl font-bold text-emerald-400 mb-2">
        FIN Scanner Prototype
    </h1>

    <div id="status"
         class="bg-slate-800 p-3 rounded-lg mb-4">
        Ready.
    </div>

    <div class="bg-black rounded-xl overflow-hidden border border-slate-700 mb-4">
        <div id="reader" style="min-height:250px;"></div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">

        <button onclick="startScanner()"
                class="bg-emerald-500 text-black font-bold py-4 rounded-xl">
            START SCAN
        </button>

        <button onclick="stopScanner()"
                class="bg-red-500 font-bold py-4 rounded-xl">
            STOP
        </button>

    </div>

    <div class="bg-slate-800 p-3 rounded-xl mb-4">

        <div class="text-sm text-slate-400 mb-2">
            Manual Test Barcode
        </div>

        <div class="flex gap-2">

            <input id="manual-fin"
                   type="text"
                   placeholder="Scan Value"
                   class="flex-1 bg-slate-900 border border-slate-600 rounded px-3 py-2">

            <button onclick="manualSubmit()"
                    class="bg-slate-700 px-4 rounded">
                Submit
            </button>

        </div>

    </div>

    <div id="result-card"
         class="hidden bg-slate-800 rounded-xl p-4 border border-slate-700">

        <div class="text-sm text-slate-400">
            Barcode / FIN
        </div>

        <div id="display-fin"
             class="text-2xl font-bold text-emerald-400 font-mono">
        </div>

        <div id="display-status"
             class="text-xl font-bold mt-4">
        </div>

        <div id="display-advice"
             class="bg-slate-900 rounded p-3 mt-3">
        </div>

        <div class="grid grid-cols-2 gap-4 mt-4">

            <div class="bg-slate-900 p-3 rounded">
                <div class="text-xs text-slate-400">
                    Rolling Past 2 Years
                </div>

                <div id="rolling-count"
                     class="text-3xl font-bold text-amber-400">
                    0
                </div>
            </div>

            <div class="bg-slate-900 p-3 rounded">
                <div class="text-xs text-slate-400">
                    Total Offences
                </div>

                <div id="total-count"
                     class="text-3xl font-bold text-rose-400">
                    0
                </div>
            </div>

        </div>

        <div class="mt-6">

            <h3 class="font-bold mb-2">
                Offence History (Past 2 Years)
            </h3>

            <div class="overflow-auto">

                <table class="w-full text-sm border border-slate-700">

                    <thead class="bg-slate-900">

                    <tr>
                        <th class="p-2 border">FIN</th>
                        <th class="p-2 border">Date</th>
                        <th class="p-2 border">Name</th>
                        <th class="p-2 border">Time</th>
                        <th class="p-2 border">Address</th>
                    </tr>

                    </thead>

                    <tbody id="history-table">
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<audio id="dingSound">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
            type="audio/ogg">
</audio>

<script>

let scanner = null;
let scannerRunning = false;

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}

function playDing(){

    const sound =
        document.getElementById("dingSound");

    sound.currentTime = 0;

    sound.play().catch(() => {});
}

async function startScanner(){

    try{

        if(scanner){

            try{
                await scanner.stop();
            }catch(e){}

            try{
                await scanner.clear();
            }catch(e){}
        }

        scanner = new Html5Qrcode("reader");

        setStatus("Loading camera...");

        await scanner.start(

            { facingMode: "environment" },

            {
                fps: 20,

                qrbox:{
                    width:300,
                    height:80
                },

                formatsToSupport:[
                    Html5QrcodeSupportedFormats.PDF_417,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            },

            async (decodedText)=>{

                await stopScanner();

                playDing();

                processScan(decodedText);

            }

        );

        scannerRunning = true;

        setStatus("Scanner Active");

    }
    catch(err){

        console.error(err);

        setStatus("Camera Error: " + err);
    }
}

async function stopScanner(){

    try{

        if(scanner && scannerRunning){

            await scanner.stop();
            await scanner.clear();

            scannerRunning = false;

            setStatus("Scanner Stopped");
        }

    }
    catch(err){
        console.error(err);
    }
}

function manualSubmit(){

    const value =
        document.getElementById("manual-fin")
            .value
            .trim();

    if(!value) return;

    processScan(value);
}

function processScan(barcode){

    setStatus("Barcode Detected");

    showResults(barcode);
}

function getAllRecords(fin){

    return JSON.parse(
        localStorage.getItem(fin) || "[]"
    );
}

function getRollingRecords(records){

    const cutoff = new Date();

    cutoff.setFullYear(
        cutoff.getFullYear() - 2
    );

    return records.filter(r =>
        new Date(r.date) >= cutoff
    );
}

function populateHistory(records){

    const table =
        document.getElementById(
            "history-table"
        );

    table.innerHTML = "";

    records.forEach(record=>{

        table.innerHTML += `
        <tr>

            <td class="border p-2">
                ${record.fin}
            </td>

            <td class="border p-2">
                ${record.date}
            </td>

            <td class="border p-2">
                ${record.workerName}
            </td>

            <td class="border p-2">
                ${record.time}
            </td>

            <td class="border p-2">
                ${record.address}
            </td>

        </tr>
        `;
    });
}

function showResults(fin){

    const card =
        document.getElementById("result-card");

    card.classList.remove("hidden");

    document.getElementById(
        "display-fin"
    ).innerText = fin;

    let records =
        getAllRecords(fin);

    // Demo data if empty

    if(records.length === 0){

        records = [

            {
                fin: fin,
                date: "2025-08-15",
                workerName: "Rahman Bin Ali",
                time: "09:32",
                address: "Jurong West Street 65"
            },

            {
                fin: fin,
                date: "2026-03-01",
                workerName: "Rahman Bin Ali",
                time: "13:21",
                address: "Woodlands Avenue 7"
            }

        ];

        localStorage.setItem(
            fin,
            JSON.stringify(records)
        );
    }

    const rollingRecords =
        getRollingRecords(records);

    const rollingCount =
        rollingRecords.length;

    const totalCount =
        records.length;

    document.getElementById(
        "rolling-count"
    ).innerText = rollingCount;

    document.getElementById(
        "total-count"
    ).innerText = totalCount;

    const status =
        document.getElementById(
            "display-status"
        );

    const advice =
        document.getElementById(
            "display-advice"
        );

    if(rollingCount === 0){

        status.innerText =
            "1ST TIME OFFENDER";

        status.className =
            "text-xl font-bold mt-4 text-blue-400";

        advice.innerText =
            "Issue verbal advisory.";

    }
    else if(rollingCount === 1){

        status.innerText =
            "2ND TIME OFFENDER";

        status.className =
            "text-xl font-bold mt-4 text-amber-400";

        advice.innerText =
            "Issue advisory and take statement.";

    }
    else{

        status.innerText =
            "REPEAT OFFENDER";

        status.className =
            "text-xl font-bold mt-4 text-red-400";

        advice.innerText =
            "Escalate for enforcement action.";
    }

    populateHistory(rollingRecords);
}

</script>

</body>
</html>
